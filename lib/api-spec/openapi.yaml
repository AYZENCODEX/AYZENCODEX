openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AYZEN Crypto Airdrop Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: projects
    description: Airdrop project management
  - name: tasks
    description: Task management
  - name: tools
    description: Platform tools (gas, wallet, streak)
  - name: vault
    description: Encrypted vault operations
  - name: leaderboard
    description: Leaderboard operations
  - name: broadcast
    description: Broadcast messaging
  - name: settings
    description: Platform settings
  - name: telemetry
    description: Developer telemetry

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/setup-2fa:
    post:
      operationId: setup2fa
      tags: [auth]
      summary: Setup TOTP 2FA — returns QR code data
      responses:
        "200":
          description: 2FA setup info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFASetup"

  /auth/verify-2fa:
    post:
      operationId: verify2fa
      tags: [auth]
      summary: Verify TOTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFAVerifyInput"
      responses:
        "200":
          description: 2FA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── USERS ─────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/{id}/stats:
    get:
      operationId: getUserStats
      tags: [users]
      summary: Get user stats summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  # ── PLATFORM STATS ────────────────────────────────────
  /admin/stats:
    get:
      operationId: getPlatformStats
      tags: [users]
      summary: Get global platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /admin/activity:
    get:
      operationId: getPlatformActivity
      tags: [users]
      summary: Get daily/monthly platform activity chart data
      responses:
        "200":
          description: Activity data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityData"

  # ── PROJECTS ──────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: tier
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update project (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /projects/{id}/join:
    post:
      operationId: joinProject
      tags: [projects]
      summary: Join a project (user)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /projects/{id}/stats:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Get project statistics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"

  /projects/{id}/members:
    get:
      operationId: getProjectMembers
      tags: [projects]
      summary: Get users working on a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"

  # ── TASKS ─────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks (optionally filtered by project)
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete task (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /tasks/{id}/submit:
    post:
      operationId: submitTask
      tags: [tasks]
      summary: User submits a task completion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskSubmitInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSubmission"

  /tasks/{id}/verify:
    post:
      operationId: verifyTask
      tags: [tasks]
      summary: Admin verifies or rejects a task submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskVerifyInput"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /tasks/submissions:
    get:
      operationId: listSubmissions
      tags: [tasks]
      summary: List all task submissions (admin review queue)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: projectId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSubmission"

  # ── TOOLS ─────────────────────────────────────────────
  /tools/gas:
    get:
      operationId: getGasPrices
      tags: [tools]
      summary: Get gas prices for all supported networks
      responses:
        "200":
          description: Gas prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GasPrice"

  /tools/gas/{network}:
    get:
      operationId: getGasByNetwork
      tags: [tools]
      summary: Get gas price for a specific network
      parameters:
        - name: network
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gas price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GasPrice"

  /tools/wallet-analysis:
    post:
      operationId: analyzeWallet
      tags: [tools]
      summary: Analyze a wallet address across networks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletAnalysisInput"
      responses:
        "200":
          description: Wallet analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletAnalysis"

  /tools/streak/{userId}:
    get:
      operationId: getUserStreak
      tags: [tools]
      summary: Get streak data for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Streak data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakData"

  /tools/spam-score:
    post:
      operationId: getSpamScore
      tags: [tools]
      summary: Analyze wallet for spam patterns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpamScoreInput"
      responses:
        "200":
          description: Spam analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpamScore"

  # ── VAULT ─────────────────────────────────────────────
  /vault:
    get:
      operationId: listVaultEntries
      tags: [vault]
      summary: List vault entries for current user
      responses:
        "200":
          description: Vault entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultEntry"
    post:
      operationId: createVaultEntry
      tags: [vault]
      summary: Create a vault entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultEntryInput"
      responses:
        "201":
          description: Created vault entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultEntry"

  /vault/{id}:
    get:
      operationId: getVaultEntry
      tags: [vault]
      summary: Get vault entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vault entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultEntry"
    patch:
      operationId: updateVaultEntry
      tags: [vault]
      summary: Update vault entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultEntryUpdate"
      responses:
        "200":
          description: Updated vault entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultEntry"
    delete:
      operationId: deleteVaultEntry
      tags: [vault]
      summary: Delete vault entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── LEADERBOARD ───────────────────────────────────────
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard rankings
      parameters:
        - name: period
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # ── BROADCAST ─────────────────────────────────────────
  /broadcast:
    get:
      operationId: listBroadcasts
      tags: [broadcast]
      summary: List all broadcasts (admin)
      responses:
        "200":
          description: Broadcasts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Broadcast"
    post:
      operationId: sendBroadcast
      tags: [broadcast]
      summary: Send a broadcast message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastInput"
      responses:
        "201":
          description: Broadcast sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broadcast"

  /broadcast/inbox:
    get:
      operationId: getBroadcastInbox
      tags: [broadcast]
      summary: Get broadcast inbox for current user
      responses:
        "200":
          description: Inbox messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Broadcast"

  # ── SETTINGS ──────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get platform settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update platform settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"

  # ── TELEMETRY ─────────────────────────────────────────
  /telemetry/functions:
    get:
      operationId: getTelemetryFunctions
      tags: [telemetry]
      summary: Get function registry with call counts and status
      responses:
        "200":
          description: Function registry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TelemetryFunction"

  /telemetry/errors:
    get:
      operationId: getTelemetryErrors
      tags: [telemetry]
      summary: Get error log
      parameters:
        - name: level
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Error log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ErrorLogEntry"

  /telemetry/ping:
    get:
      operationId: pingServices
      tags: [telemetry]
      summary: Ping all registered services
      responses:
        "200":
          description: Service ping results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServicePing"

  /telemetry/smoke-test:
    post:
      operationId: runSmokeTest
      tags: [telemetry]
      summary: Run smoke test suite across API endpoints
      responses:
        "200":
          description: Smoke test results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SmokeTestResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ── AUTH ────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        totpCode:
          type: ["string", "null"]

    RefreshInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [token, refreshToken, user]
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    TwoFASetup:
      type: object
      required: [otpauthUrl, secret, qrCodeDataUrl]
      properties:
        otpauthUrl:
          type: string
        secret:
          type: string
        qrCodeDataUrl:
          type: string

    TwoFAVerifyInput:
      type: object
      required: [code]
      properties:
        code:
          type: string

    # ── USER ────────────────────────────────────────────
    User:
      type: object
      required: [id, username, email, role, status, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        avatarUrl:
          type: ["string", "null"]
        twoFaEnabled:
          type: boolean
        emailVerified:
          type: boolean
        createdAt:
          type: string
        lastActiveAt:
          type: ["string", "null"]
        walletCount:
          type: integer
        totalRoi:
          type: number

    UserDetail:
      type: object
      required: [id, username, email, role, status, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
        status:
          type: string
        avatarUrl:
          type: ["string", "null"]
        twoFaEnabled:
          type: boolean
        emailVerified:
          type: boolean
        createdAt:
          type: string
        lastActiveAt:
          type: ["string", "null"]
        walletCount:
          type: integer
        totalRoi:
          type: number
        projectCount:
          type: integer
        tasksCompleted:
          type: integer
        streak:
          type: integer
        walletAddresses:
          type: array
          items:
            type: string

    UserUpdate:
      type: object
      properties:
        role:
          type: string
        status:
          type: string
        username:
          type: string

    UserStats:
      type: object
      required: [totalRoi, projectCount, tasksCompleted, streak, walletCount, rank, tasksToday, tasksThisWeek]
      properties:
        totalRoi:
          type: number
        projectCount:
          type: integer
        tasksCompleted:
          type: integer
        streak:
          type: integer
        walletCount:
          type: integer
        rank:
          type: integer
        tasksToday:
          type: integer
        tasksThisWeek:
          type: integer

    UserListResponse:
      type: object
      required: [users, total, page, limit]
      properties:
        users:
